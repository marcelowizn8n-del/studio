version: "3.9"

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://studio.thinkingtools.io}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.thinkingtools.io}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:8000}
    expose:
      - "3000"
    depends_on:
      - api
    networks:
      app_net:
      npm_shared:
        aliases:
          - studio-web

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DOMAIN: ${APP_DOMAIN:-thinkingtools.io}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-https://studio.thinkingtools.io}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-story_agent}
      POSTGRES_USER: ${POSTGRES_USER:-story_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-2}
      OPENAI_IMAGE_SIZE: ${OPENAI_IMAGE_SIZE:-1536x1024}
      OPENAI_IMAGE_QUALITY: ${OPENAI_IMAGE_QUALITY:-medium}
      OPENAI_IMAGE_FORMAT: ${OPENAI_IMAGE_FORMAT:-png}
    expose:
      - "8000"
    depends_on:
      - postgres
      - redis
    networks:
      app_net:
      npm_shared:
        aliases:
          - studio-api

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-story_agent}
      POSTGRES_USER: ${POSTGRES_USER:-story_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - app_net

volumes:
  postgres_data:
  redis_data:

networks:
  app_net:
    driver: bridge
  npm_shared:
    external: true
